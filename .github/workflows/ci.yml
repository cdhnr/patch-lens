name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest
